name: Harness

on:
  push:
  pull_request:

jobs:
  harness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy scipy ruff

      - name: Repo health
        run: python scripts/repo_health.py --strict

      - name: Ruff
        run: ruff check mmsfm/ csp/ scripts/ tests/

      - name: Focused harness tests
        run: |
          pytest -q \
            tests/test_install_repo_skills.py \
            tests/test_harness_inventory.py \
            tests/test_repo_health.py \
            tests/test_tran_evaluation_run_support.py \
            tests/test_tran_evaluation_conditional_support.py \
            tests/test_tran_evaluation_conditional_metrics.py

  csp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CSP validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[csp]"

      - name: CSP smoke checks
        run: make smoke-csp

      - name: CSP tests
        run: make test-csp
