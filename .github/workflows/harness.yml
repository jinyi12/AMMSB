name: Harness

on:
  push:
  pull_request:

jobs:
  harness:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest numpy scipy ruff

      - name: Repo health
        run: make repo-health && python scripts/repo_health.py --strict

      - name: Ruff
        run: ruff check mmsfm/ csp/ scripts/ tests/

      - name: Harness tests
        run: make test-harness

  tran-eval:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tran-evaluation dependencies
        run: |
          python -m pip install --upgrade pip
          make install-local

      - name: Tran-evaluation smoke checks
        run: make smoke-tran-eval

      - name: Tran-evaluation tests
        run: make test-tran-eval

  csp:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CSP validation dependencies
        run: |
          python -m pip install --upgrade pip
          make install-csp

      - name: CSP smoke checks
        run: make smoke-csp

      - name: CSP tests
        run: make test-csp
